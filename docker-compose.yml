services:
  postgres:
    image: postgres:16-alpine
    container_name: noor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: noor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noor_secret}
      POSTGRES_DB: noor_collection
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noor -d noor_collection"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noor-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://noor:${POSTGRES_PASSWORD:-noor_secret}@postgres:5432/noor_collection?schema=public
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_NAME: Noor Collection
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: Dockerfile.seed
    container_name: noor-seed
    environment:
      DATABASE_URL: postgresql://noor:${POSTGRES_PASSWORD:-noor_secret}@postgres:5432/noor_collection?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - seed

volumes:
  postgres_data:
